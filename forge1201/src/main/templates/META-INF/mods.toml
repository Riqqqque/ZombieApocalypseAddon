modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="zombielogo.png"
authors="${mod_authors}"
description='''
A configurable zombie apocalypse gameplay addon for Forge 1.20.1.

Core gameplay:
- Optional sunlight immunity for zombies.
- Custom day/night spawning near players.
- Horde events and blood moon nights.
- Day-based difficulty scaling.
- Death cooldown safety window.
- Persistent kill and cooldown statistics.

Admin commands:
/zhelp, /zburn, /zkill, /zhorde, /zbloodmoon, /zstats, /zscaling, /zdayspawn
'''

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"
